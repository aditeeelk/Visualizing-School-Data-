<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Public School Enrollment in the US</title>
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
    <!-- include google web fonts -->
    <link href="https://fonts.googleapis.com/css?family=Titillium+Web|Oswald" rel="stylesheet">
    <link href="https://api.mapbox.com/mapbox-gl-js/v2.8.1/mapbox-gl.css" rel="stylesheet">
    <!-- include icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/c3.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Titillium Web', serif;
        }

        #map {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 100%;
        }

        #info {
            z-index: 1000;
            position: absolute;
            width: 500px;
            top: 1%;
            bottom: 1%;
            left: .5%;
            padding: 40px 15px 900px 15px;
            background: #343a40;
            color: white;

        }


        /* social media icons */
        #info a {
            color: lightgray;
        }

        #info a:hover {
            color: white;
            opacity: 0.3;
        }


        #title {
            font-size: 25px;
            font-family: 'Oswald', sans-serif;
        }

        /* social media icons */
        #title span {
            font-size: 14px;
            float: right;
            margin-right: 10px;
        }


        #desc {
            text-align: center;
            color: lightgray;
            font-size: medium;
            font-weight: bold;
            margin-bottom: 0px;
        }

        #diploma-avg {
            margin: 0;
            text-align: center;
            color: orange;
            font-size: 50px;
        }

        #earthquake-chart {
            top: 20px;
        }


        #footer {
            position: absolute;
            bottom: 0px;
            margin-bottom: 20px;
            margin-right: 10px;
            font-size: 13px;
            line-height: 150%;
            color: lightgray;
        }

        /* the layout of the legend panel */
        #legend {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 110px;
            background: #fff;
            margin-right: 20px;
            margin-bottom: 40px;
            padding: 10px 20px 10px 10px;
            border-radius: 3px;
            text-align: center;
            font-family: 'Open Sans', sans-serif;
        }

        /* each line for a break */
        .break {
            position: relative;
            margin: 0px;
            padding: 0px;
        }

        /* basic style for a box */
        .box {
            display: inline-block;
            width: 18px;
            height: 18px;
            margin-right: 8px;
            opacity: 0.7;
        }

        /* the label for the box */
        .box-label {
            font-style: italic;
        }
    </style>
    <script src="https://api.mapbox.com/mapbox-gl-js/v2.8.1/mapbox-gl.js"></script>
    <!-- include c3.js to make charts. c3.js is built upon d3.js -->
    <script src="js/d3.js"></script>
    <script src="js/c3.min.js"></script>
</head>

<body>
    <div id="info">
        <div id="title">
            High School Enrollment - Washington Schools
            <span><a href="https://twitter.com/UW" target="_blank"><i class="bi bi-twitter"></i></a></span>
            <span><a href="https://github.com/jakobzhao/geog458" target="_blank"><i class="bi bi-github"></i></a></span>
            <span id="reset"><a href="#">reset</a></span>
        </div>
        <div id="count" class="card">
            <h5 id="desc"> Average Enrollment in the displaying region</h5>
            <p id="enrollment-avg"></p>
        </div>
        <div id="enrollment-chart"></div>

    </div>
    <div id="map"></div>
    <div id="legend"></div>
    <script>
        // assign the access token
        mapboxgl.accessToken = 'pk.eyJ1IjoiYWVsa3VuY2h3YXIiLCJhIjoiY21oZWM5ZnBnMGRxNzJscHV5bmp4eXBidSJ9.lx_hyQVKP_Tj5MqbTnqwIw';

        // declare the map object
        let map = new mapboxgl.Map({
            container: 'map', // container ID
            style: 'mapbox://styles/mapbox/dark-v10',
            zoom: 7, // starting zoom
            center: [-120, 47] // starting center
        });

        // declare popup variables
        let popup = null, clickPopup = null;

        // declare the coordinated chart as well as other variables.
        let enrollmentChart = null,
            enrollmentBins = {},
            avgEnrollment = 0;

        // create a few constant variables.
        const grades = [500, 1000, 1500, 2000, 3000],
            colors = ['#d73027', '#fc8d59', '#fee08b', '#91cf60', '#1a9850'],
            bins = ['<500', '500-1000', '1000-1500', '1500-2000', '2000+'];

        // create the legend object and anchor it to the html element with id legend.
        const legend = document.getElementById('legend');

        // set up legend grades content and labels
        let labels = ['<strong>Enrollment (Students)</strong>'];

        // iterate through grades and create a color box and label for each
        for (var i = 0; i < bins.length; i++) {
            labels.push(
                '<p class="break"><i class="box" style="background:' + colors[i] + ';"></i> <span class="box-label">' + bins[i] + '</span></p>');
        }
        const source = '<p style="text-align: right; font-size:10pt">Source: Education Data</p>';

        // join all the labels and the source to create the legend content.
        legend.innerHTML = labels.join('') + source;

        // define the asynchronous function to load geojson data.
        async function geojsonFetch() {
            let response = await fetch('assets/wa_schools.geojson');
            let data = await response.json();

            // filter to only operational schools with valid enrollment
            data.features = data.features.filter(f => f.properties.STATUS === '1' && f.properties.TOTAL && f.properties.TOTAL > 0 && f.properties.TOTAL > 500);

            map.on('load', () => {
                console.log('Map loaded, adding source and layer');
                // add a source of the data and then add the layer out of the source
                map.addSource('schools', {
                    type: 'geojson',
                    data: data
                });

                map.addLayer({
                    'id': 'schools-layer',
                    'type': 'circle',
                    'source': 'schools',
                    'paint': {
                        'circle-radius': 10,
                        'circle-color': '#ff0000',
                        'circle-opacity': 0.7
                    }
                });
                console.log('Layer added');

                // hover for popup
                map.on('mousemove', 'schools-layer', (e) => {
                    map.getCanvas().style.cursor = 'pointer';
                    if (popup) popup.remove();
                    let props = e.features[0].properties;
                    popup = new mapboxgl.Popup()
                        .setLngLat(e.lngLat)
                        .setHTML(`<strong>${props.SCH_NAME}</strong><br>Enrollment: ${props.TOTAL}<br>Level: ${props.SCHOOL_LEVEL}`)
                        .addTo(map);
                });

                map.on('mouseleave', 'schools-layer', () => {
                    if (popup) {
                        popup.remove();
                        popup = null;
                    }
                });

                // click for more info
                map.on('click', 'schools-layer', (e) => {
                    if (clickPopup) clickPopup.remove();
                    let props = e.features[0].properties;
                    clickPopup = new mapboxgl.Popup()
                        .setLngLat(e.lngLat)
                        .setHTML(`<strong>${props.SCH_NAME}</strong><br>Enrollment: ${props.TOTAL}<br>Level: ${props.SCHOOL_LEVEL}<br>Address: ${props.LSTREET1}, ${props.LCITY}, ${props.LSTATE}`)
                        .addTo(map);
                });

                // calculate average enrollment in current bounds
                avgEnrollment = calEnrollment(data, map.getBounds());
                document.getElementById("enrollment-avg").innerHTML = avgEnrollment.toFixed(0);

                // calculate bins
                enrollmentBins = calBins(data, map.getBounds());

                let x = Object.keys(enrollmentBins);
                x.unshift("bin");
                let y = Object.values(enrollmentBins);
                y.unshift("#");

                // generate the chart
                enrollmentChart = c3.generate({
                    size: {
                        height: 350,
                        width: 460
                    },
                    data: {
                        x: 'bin',
                        columns: [x, y],
                        type: 'bar',
                        colors: {
                            '#': (d) => {
                                return colors[Math.floor(d.x / 1)]; // adjust
                            }
                        }
                    },
                    axis: {
                        x: {
                            type: 'category',
                        },
                        y: {
                            tick: {
                                values: [100, 200, 300, 400]
                            }
                        }
                    },
                    legend: {
                        show: false
                    },
                    bindto: "#enrollment-chart"
                });
            });

            map.on('idle', () => {
                avgEnrollment = calEnrollment(data, map.getBounds());
                document.getElementById("enrollment-avg").innerHTML = avgEnrollment.toFixed(0);

                enrollmentBins = calBins(data, map.getBounds());

                let x = Object.keys(enrollmentBins);
                x.unshift("bin");
                let y = Object.values(enrollmentBins);
                y.unshift("#");

                enrollmentChart.load({
                    columns: [x, y]
                });
            });
        }

        // function to calculate average enrollment in bounds
        function calEnrollment(data, bounds) {
            let total = 0, count = 0;
            data.features.forEach(f => {
                // rough check if school is in bounds
                let coords = f.geometry.coordinates;
                if (bounds.contains(coords)) {
                    total += f.properties.TOTAL;
                    count++;
                }
            });
            return count > 0 ? total / count : 0;
        }

        // function to calculate bins
        function calBins(data, bounds) {
            let binsCount = { '<500': 0, '500-1000': 0, '1000-1500': 0, '1500-2000': 0, '2000+': 0 };
            data.features.forEach(f => {
                let coords = f.geometry.coordinates;
                if (bounds.contains(coords)) {
                    let enrollment = f.properties.TOTAL;
                    if (enrollment < 500) binsCount['<500']++;
                    else if (enrollment < 1000) binsCount['500-1000']++;
                    else if (enrollment < 1500) binsCount['1000-1500']++;
                    else if (enrollment < 2000) binsCount['1500-2000']++;
                    else binsCount['2000+']++;
                }
            });
            return binsCount;
        }

        // call the function
        geojsonFetch();

        // capture the element reset and add a click event to it.
        const reset = document.getElementById('reset');
        reset.addEventListener('click', event => {
            // this event will trigger the map fly to its origin location and zoom level.
            map.flyTo({
                zoom: 7,
                center: [-120, 47]
            });
        });
    </script>
</body>

</html>
